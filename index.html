<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scRNA-seq Copilot Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap');

        :root {
            --bg-base: #000000;
            --bg-sidebar: #050505;
            --bg-panel: #0A0A0A;
            --bg-editor: #060606;
            --border-color: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: #EDEDED;
            -webkit-font-smoothing: antialiased;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .panel-divider { border-color: var(--border-color); }

        .prose h1 { font-size: 1.25rem; line-height: 1.75rem; font-weight: 600; color: #fff; margin-top: 1.5rem; margin-bottom: .75rem; letter-spacing: -0.01em; }
        .prose h2 { font-size: 1rem; line-height: 1.5rem; font-weight: 500; color: #fff; margin-top: 1.25rem; margin-bottom: .5rem; border-bottom: 1px solid rgba(255,255,255,.1); padding-bottom: .25rem; }
        .prose h3 { font-size: 14px; font-weight: 500; color: #e5e7eb; margin-top: 1rem; margin-bottom: .5rem; }
        .prose p { color: #d1d5db; line-height: 1.625; margin-bottom: .75rem; font-size: 13px; }
        .prose ul, .prose ol { list-style-position: inside; color: #d1d5db; margin-bottom: .75rem; padding-left: .25rem; font-size: 13px; line-height: 1.625; }
        .prose ul { list-style-type: disc; }
        .prose ol { list-style-type: decimal; }
        .prose li { margin-top: .25rem; margin-bottom: .25rem; }
        .prose li::marker { color: #6366f1; }
        .prose table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 11px; border-radius: .5rem; overflow: hidden; border: 1px solid rgba(255,255,255,.1); }
        .prose th { background: #151515; text-align: left; padding: .625rem; font-weight: 500; color: #e5e7eb; border-bottom: 1px solid rgba(255,255,255,.1); }
        .prose td { padding: .625rem; border-bottom: 1px solid rgba(255,255,255,.05); color: #9ca3af; }
        .prose tr:hover td { background: rgba(255,255,255,.02); }
        .prose code { background: #151515; border: 1px solid rgba(255,255,255,.1); padding: .125rem .375rem; border-radius: .25rem; color: #a5b4fc; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .prose pre { background: #0D0D0D; padding: .875rem; border-radius: .75rem; overflow-x: auto; border: 1px solid rgba(255,255,255,.1); color: #d1d5db; font-size: 11px; line-height: 1.625; margin: .75rem 0; box-shadow: 0 10px 15px -3px rgba(0,0,0,.4); }
        .prose pre code { background: transparent; border: none; padding: 0; color: inherit; }
        .prose blockquote { border-left: 2px solid #6366f1; padding: .25rem 0 .25rem .75rem; color: #6b7280; font-style: italic; margin: .75rem 0; background: rgba(99,102,241,.02); border-radius: 0 .5rem .5rem 0; }
        .prose img { border-radius: .5rem; border: 1px solid rgba(255,255,255,.1); margin: 1rem auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,.4); max-width: 100%; height: auto; object-fit: cover; transition: border-color .2s; cursor: zoom-in; background: #000; }
        .prose img:hover { border-color: rgba(99,102,241,.5); }

        .session-item.active { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2); }

        details.trace-box summary::-webkit-details-marker { display: none; }
        details.trace-box summary { list-style: none; }
        details.trace-box[open] summary .arrow-icon { transform: rotate(90deg); }

        #left-sidebar {
            width: 14rem;
            transition: width 180ms ease;
            background-color: var(--bg-sidebar);
        }
        body.sidebar-collapsed #left-sidebar { width: 3.75rem; }
        body.sidebar-collapsed .sidebar-label,
        body.sidebar-collapsed .session-title-text,
        body.sidebar-collapsed .session-meta-text,
        body.sidebar-collapsed .sidebar-search,
        body.sidebar-collapsed .settings-label,
        body.sidebar-collapsed .new-pipeline-label { display: none; }
        body.sidebar-collapsed .session-item { justify-content: center; padding-left: 0.5rem; padding-right: 0.5rem; }
        body.sidebar-collapsed #session-list { padding-left: 0.35rem; padding-right: 0.35rem; }

        .run-card {
            border-radius: .75rem;
            border: 1px solid rgba(255,255,255,.1);
            background: #0D0D0D;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,.35);
        }
        .run-card.running { border-color: rgba(245,158,11,.3); background: rgba(245,158,11,.035); }
        .run-card.success { border-color: rgba(16,185,129,.25); background: rgba(16,185,129,.025); }
        .run-card.failed { border-color: rgba(239,68,68,.3); background: rgba(239,68,68,.035); }
        .run-card.interrupted { border-color: rgba(249,115,22,.3); background: rgba(249,115,22,.035); }

        .step-node { position: relative; display: flex; align-items: center; gap: .5rem; font-size: 11px; color: #6b7280; min-width: 0; flex-shrink: 0; }
        .step-dot { width: 1.25rem; height: 1.25rem; border-radius: 9999px; border: 1px solid rgba(255,255,255,.1); background: #151515; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; }
        .step-node.done .step-dot { background: rgba(16,185,129,.15); border-color: rgba(16,185,129,.35); color: #6ee7b7; }
        .step-node.running .step-dot { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.35); color: #fcd34d; }
        .step-node.failed .step-dot { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.4); color: #fca5a5; }
        .step-node.done .step-label { color: #6ee7b7; }
        .step-node.running .step-label { color: #fcd34d; }
        .step-node.failed .step-label { color: #fca5a5; }

        .workspace-tab.active { background: #111; color: #a5b4fc; border-color: rgba(99,102,241,.5); }
        .editor-tab.active { background: #111; color: #f3f4f6; border-top-color: #6366f1; }
        .file-row.active { background: rgba(99,102,241,.15); color: #c7d2fe; }
        .file-row:hover { background: rgba(255,255,255,.05); }

        .dev-hidden { display: none; }
        body.dev-mode .dev-hidden { display: inline-flex; }


        :root {
            --sidebar-w: 14rem;
            --chat-w: 470px;
        }

        #app-main {
            --handle-w: 5px;
        }

        #left-sidebar {
            width: var(--sidebar-w);
            min-width: 3.75rem;
            max-width: 34rem;
        }

        #chat-panel {
            width: var(--chat-w);
            min-width: 320px;
            max-width: 70vw;
        }

        #workspace-panel {
            min-width: 360px;
        }

        .resize-handle {
            width: var(--handle-w);
            cursor: col-resize;
            background: transparent;
            position: relative;
            flex-shrink: 0;
            z-index: 30;
        }

        .resize-handle::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 2px;
            width: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .resize-handle:hover::after,
        .resize-handle.active::after {
            left: 1px;
            width: 3px;
            background: rgba(99, 102, 241, 0.75);
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.35);
        }

        body.is-resizing {
            cursor: col-resize;
            user-select: none;
        }

        body.sidebar-collapsed #left-sidebar {
            width: 3.75rem !important;
            min-width: 3.75rem !important;
            max-width: 3.75rem !important;
        }

        body.sidebar-collapsed #sidebar-resizer {
            display: none;
        }

        body.workspace-fullscreen header,
        body.workspace-fullscreen #left-sidebar,
        body.workspace-fullscreen #sidebar-resizer,
        body.workspace-fullscreen #chat-panel,
        body.workspace-fullscreen #chat-resizer {
            display: none !important;
        }

        body.workspace-fullscreen #app-main {
            position: fixed;
            inset: 0;
            z-index: 120;
            height: 100vh;
        }

        body.workspace-fullscreen #workspace-panel {
            position: fixed;
            inset: 0;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 130;
            background: #000;
        }

        body.workspace-fullscreen #workspace-fullscreen-icon-enter {
            display: none;
        }

        body:not(.workspace-fullscreen) #workspace-fullscreen-icon-exit {
            display: none;
        }

        .locked-setting { opacity: 0.45; pointer-events: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-indigo-500/30">

<header class="h-12 border-b panel-divider bg-[#050505] flex items-center justify-between px-4 shrink-0 z-50">
    <div class="flex items-center space-x-4">
        <button onclick="toggleSidebarCollapse()" class="w-8 h-8 rounded-lg border border-white/10 bg-white/[0.03] hover:bg-white/[0.07] flex items-center justify-center text-gray-400 hover:text-white transition-colors" title="折叠左侧栏">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="flex items-center space-x-2 text-gray-200">
            <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
            <span class="font-medium text-[13px] tracking-wide">scRNA-seq Copilot</span>
        </div>
        <div class="h-4 w-px bg-white/10"></div>
        <span class="text-[11px] text-gray-500 mono flex items-center space-x-2">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
        </span>
    </div>

    <div class="flex items-center space-x-3">
        <button onclick="openApiTraceModal()" class="dev-hidden group items-center space-x-1.5 text-[11px] text-gray-400 hover:text-indigo-400 transition-colors px-2 py-1 rounded hover:bg-white/5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span class="mono">Dev Trace</span>
        </button>
        <span id="auth-chip" class="text-[10px] mono px-2 py-1 rounded border border-white/10 bg-white/[0.03] text-gray-500">GUEST</span>
    </div>
</header>

<main id="app-main" class="flex-1 flex overflow-hidden bg-black relative">

    <!-- 左栏: 会话管理 -->
    <aside id="left-sidebar" class="border-r panel-divider flex flex-col shrink-0">
        <div class="p-3 border-b panel-divider space-y-2">
            <button onclick="createSession()" class="w-full flex items-center justify-center space-x-2 bg-indigo-600 hover:bg-indigo-500 text-white text-[12px] font-medium py-2 rounded-lg transition-colors">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                <span class="new-pipeline-label">New Pipeline</span>
            </button>
            <input id="session-search" oninput="renderSessionList()" class="sidebar-search w-full bg-[#111] border border-white/10 rounded-lg px-3 py-1.5 text-[11px] text-gray-300 placeholder-gray-600 focus:outline-none focus:border-indigo-500/40" placeholder="Search sessions..." />
        </div>
        <div class="flex-1 overflow-y-auto p-2 space-y-1" id="session-list"></div>

        <div class="border-t panel-divider p-2">
            <button onclick="openSettingsModal()" class="w-full flex items-center justify-center gap-2 rounded-lg border border-white/10 bg-white/[0.03] hover:bg-white/[0.07] px-2 py-2 text-[12px] text-gray-400 hover:text-white transition-colors">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.827 2.37 2.37a1.724 1.724 0 001.065 2.572c1.757.427 1.757 2.925 0 3.351a1.724 1.724 0 00-1.066 2.573c.94 1.543-.827 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.427 1.757-2.925 1.757-3.351 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.827-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.757-.427-1.757-2.925 0-3.351a1.724 1.724 0 001.066-2.573c-.94-1.543.827-3.31 2.37-2.37.996.607 2.29.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="settings-label">Settings</span>
            </button>
        </div>
    </aside>

    <div id="sidebar-resizer" class="resize-handle" data-resize="sidebar" title="拖动调整左栏宽度"></div>

    <!-- 中栏: Chat 对话交互区 -->
    <section id="chat-panel" class="border-r panel-divider bg-[#0A0A0A] flex flex-col relative shrink-0">
        <div class="h-10 border-b panel-divider flex items-center px-4 justify-between shrink-0 bg-[#050505]">
            <div class="flex items-center gap-2 min-w-0">
                <span class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider truncate" id="current-session-title">Chat</span>
                <span id="session-run-count" class="text-[10px] mono text-gray-600"></span>
            </div>
            <button onclick="clearCurrentSession()" class="text-[11px] text-gray-500 hover:text-red-400 flex items-center space-x-1 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                <span>Clear Memory</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-5 pb-32 space-y-6" id="chat-history-container"></div>

        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#0A0A0A] via-[#0A0A0A]/95 to-transparent z-30">
            <div class="relative flex items-end shadow-xl shadow-black/50">
                <textarea id="user-query-input" rows="1" placeholder="Describe the pipeline steps..." class="w-full bg-[#111] border border-white/10 rounded-xl pl-4 pr-10 py-3 text-[13px] text-gray-200 placeholder-gray-600 focus:outline-none focus:border-indigo-500/50 focus:bg-[#161616] transition-all resize-none max-h-32 leading-relaxed" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                <button id="run-btn" onclick="toggleAction()" class="absolute right-2 bottom-2 p-1.5 rounded-lg text-gray-500 hover:text-indigo-400 hover:bg-indigo-500/10 transition-all">
                    <svg id="icon-send" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    <svg id="icon-stop" class="w-4 h-4 hidden text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                </button>
            </div>
        </div>
    </section>

    <div id="chat-resizer" class="resize-handle" data-resize="chat" title="拖动调整 Chat / Workspace 比例"></div>

    <!-- 右侧: VS Code 风格 Artifacts Workspace -->
    <section id="workspace-panel" class="flex-1 bg-[#000000] flex flex-col relative min-w-0">
        <div class="h-10 border-b panel-divider bg-[#050505] flex items-center justify-between px-2 shrink-0">
            <div class="flex items-center h-full">
                <button onclick="setWorkspaceView('explorer')" id="tab-explorer" class="workspace-tab active h-full flex items-center px-4 border-r border-transparent text-[12px] text-gray-300 gap-2">
                    <svg class="w-3.5 h-3.5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
                    Explorer
                </button>
                <button onclick="setWorkspaceView('report')" id="tab-report" class="workspace-tab h-full flex items-center px-4 border-r border-transparent text-[12px] text-gray-400 hover:text-gray-200">Report</button>
                <button onclick="setWorkspaceView('run')" id="tab-run" class="workspace-tab h-full flex items-center px-4 border-r border-transparent text-[12px] text-gray-400 hover:text-gray-200">Run</button>
                <button onclick="setWorkspaceView('gallery')" id="tab-gallery" class="workspace-tab h-full flex items-center px-4 border-r border-transparent text-[12px] text-gray-400 hover:text-gray-200">Gallery</button>
                <button onclick="setWorkspaceView('tables')" id="tab-tables" class="workspace-tab h-full flex items-center px-4 border-r border-transparent text-[12px] text-gray-400 hover:text-gray-200">Tables</button>
                <button onclick="setWorkspaceView('logs')" id="tab-logs" class="workspace-tab h-full flex items-center px-4 border-r border-transparent text-[12px] text-gray-400 hover:text-gray-200">Logs</button>
            </div>
            <div class="flex items-center gap-2 pr-2">
                <select id="workspace-root" onchange="refreshWorkspace()" class="bg-[#0D0D0D] border border-white/10 rounded-md px-2 py-1 text-[11px] text-gray-400 focus:outline-none focus:border-indigo-500/40">
                    <option value="all">all</option>
                    <option value="workspace">workspace</option>
                    <option value="output">output</option>
                    <option value="data">data</option>
                    <option value="skill">skill</option>
                </select>
                <button onclick="triggerDataUpload()" class="text-[11px] text-gray-500 hover:text-emerald-300 px-2 py-1 rounded hover:bg-white/5">Upload Data</button>
                <button onclick="triggerSkillUpload()" class="text-[11px] text-gray-500 hover:text-amber-300 px-2 py-1 rounded hover:bg-white/5">Add Skill</button>
                <input id="data-upload-input" type="file" multiple class="hidden" onchange="uploadFiles('data', this.files)" />
                <input id="skill-upload-input" type="file" multiple accept=".zip,.py,.R,.r,.sh,.json,.yaml,.yml,.md,.txt" class="hidden" onchange="uploadFiles('skill', this.files)" />
                <button id="workspace-fullscreen-btn" onclick="toggleWorkspaceFullscreen()" class="text-[11px] text-gray-500 hover:text-indigo-300 px-2 py-1 rounded hover:bg-white/5 flex items-center gap-1" title="Workspace 全屏">
                    <svg id="workspace-fullscreen-icon-enter" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
                    <svg id="workspace-fullscreen-icon-exit" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5"/></svg>
                    <span id="workspace-fullscreen-label">Fullscreen</span>
                </button>
                <button onclick="refreshWorkspace()" class="text-[11px] text-gray-500 hover:text-indigo-300 px-2 py-1 rounded hover:bg-white/5">Refresh</button>
                <span id="workspace-status" class="mono text-[10px] text-gray-600"></span>
            </div>
        </div>

        <div class="flex-1 min-h-0 flex bg-[#000]">
            <aside id="workspace-explorer" class="w-64 shrink-0 border-r panel-divider bg-[#050505] flex flex-col">
                <div class="h-9 border-b panel-divider flex items-center justify-between px-3">
                    <span class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Artifacts Explorer</span>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleExpandAll()" class="text-gray-600 hover:text-gray-300" title="展开/折叠全部">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" d="M8 9l4-4 4 4m0 6l-4 4-4-4"/></svg>
                        </button>
                        <button onclick="toggleWorkspaceFullscreen()" class="text-gray-600 hover:text-gray-300" title="全屏画板">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/></svg>
                        </button>
                        <button onclick="refreshWorkspace()" class="text-gray-600 hover:text-gray-300" title="刷新">

<script>
const API_BASE = window.location.protocol === 'file:' ? "http://127.0.0.1:8000" : window.location.origin;
const EXPLORER_BASE = window.location.protocol === 'file:' ? "http://127.0.0.1:6475" : `${window.location.protocol}//${window.location.hostname}:6475`;

const PIPELINE_STEPS = [
    { key: 'read_data', label: '读取数据', keywords: ['读取', 'read', 'load', 'directory', 'create_seurat', 'cellbender'] },
    { key: 'qc', label: 'QC', keywords: ['qc', 'filter', '过滤', 'doublet', 'empty', 'sctransform'] },
    { key: 'cluster', label: '聚类', keywords: ['cluster', '聚类', 'umap', 'pca', 'find_clusters'] },
    { key: 'marker', label: 'marker', keywords: ['marker', 'markers', 'find_markers', '差异', '基因'] },
    { key: 'annotation', label: '注释', keywords: ['annotation', 'cell_type', '细胞类型', '注释', 'review'] },
    { key: 'report', label: '报告', keywords: ['report', '报告', 'scan_output', 'save_analysis_report', '展示'] }
];

const DEFAULT_IGNORE_RULES = [
    '.DS_Store',
    '__pycache__',
    '.ipynb_checkpoints',
    '.git',
    '.venv',
    'node_modules',
    '*.tmp',
    '*.bak',
    '~$*'
];

let ignoreRules = [...DEFAULT_IGNORE_RULES];
let sessions = loadSessions();
let activeSessionId = localStorage.getItem('scrna_copilot_active_id') || sessions[0].id;
if (!sessions.find(s => s.id === activeSessionId)) activeSessionId = sessions[0].id;

let isRunning = false;
let timerInterval = null;
let pollInterval = null;
let startTime = 0;
let renderedLogCount = 0;
let renderedTraceCount = 0;
let currentAiMsgId = null;
let currentRunId = null;
let latestApiTraces = [];
let workspaceView = 'explorer';
let openedFiles = [];
let activeFilePath = null;
let collapsedFolders = new Set(JSON.parse(localStorage.getItem('scrna_collapsed_folders_v1') || '["run", "run:", "data", "data:"]'));

let settings = loadSettings();
let currentUser = loadCurrentUser();
let isLoggedIn = !!currentUser.token;

const renderer = new marked.Renderer();
renderer.image = function(href_or_token, title, text) {
    let href = typeof href_or_token === 'object' ? href_or_token.href : href_or_token;
    let imgText = typeof href_or_token === 'object' ? href_or_token.text : text;
    let finalHref = normalizeAssetUrl(href || "");
    const safeText = escapeHtml(imgText || '');
    const safeHref = escapeHtml(finalHref);
    return `
    <div class="group relative my-5 rounded-lg border border-white/10 bg-[#0A0A0A] overflow-hidden shadow-xl transition-all hover:border-indigo-500/50">
        <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity z-10">
            <button onclick="openLightbox('${escapeAttr(safeHref)}', '${escapeAttr(safeText)}')" class="bg-black/60 backdrop-blur-md text-gray-300 hover:text-white p-1.5 rounded-md border border-white/10 shadow-lg hover:bg-indigo-500/80">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/></svg>
            </button>
        </div>
        <img src="${safeHref}" alt="${safeText}" class="w-full h-auto object-cover cursor-zoom-in m-0 rounded-none border-none" onclick="openLightbox('${escapeAttr(safeHref)}', '${escapeAttr(safeText)}')" />
        ${safeText ? `<div class="p-2 border-t border-white/5 bg-[#050505] text-center text-[11px] text-gray-400 flex items-center justify-center space-x-1.5"><svg class="w-3 h-3 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>${safeText}</span></div>` : ''}
    </div>`;
};
marked.use({ renderer });

window.addEventListener('load', async () => {
    initResizableLayout();
    initDragAndDrop();
    applySettingsToUI();
    await loadIgnoreRules();
    switchSession(activeSessionId);
    fetch(`${API_BASE}/api/logs`).then(() => updateStatus(true)).catch(() => updateStatus(false));
    renderSettingsState();
});

function loadSessions() {
    const raw = localStorage.getItem('scrna_copilot_sessions_v3') || localStorage.getItem('scrna_copilot_sessions_v2');
    let loaded = null;
    try { loaded = raw ? JSON.parse(raw) : null; } catch {}
    if (!Array.isArray(loaded) || loaded.length === 0) {
        loaded = [{ id: 's_' + Date.now(), name: 'Sample Analysis 1', chats: [], runs: [], createdAt: Date.now(), updatedAt: Date.now() }];
    }
    loaded.forEach(s => {
        if (!s.id) s.id = 's_' + Date.now();
        if (!Array.isArray(s.chats)) s.chats = [];
        if (!Array.isArray(s.runs)) s.runs = [];
        if (!s.createdAt) s.createdAt = Date.now();
        if (!s.updatedAt) s.updatedAt = s.createdAt;
    });
    return loaded;
}

function loadSettings() {
    try {
        return {
            apiBase: API_BASE,
            model: 'deepseek-chat',
            devMode: false,
            autoRefreshWorkspace: true,
            ...(JSON.parse(localStorage.getItem('scrna_copilot_settings_v1') || '{}'))
        };
    } catch {
        return { apiBase: API_BASE, model: 'deepseek-chat', devMode: false, autoRefreshWorkspace: true };
    }
}

function loadCurrentUser() {
    try {
        return JSON.parse(localStorage.getItem('scrna_copilot_current_user') || '{}') || {};
    } catch {
        return {};
    }
}

function getRuntimeUsername() {
    return currentUser.username || 'guest';
}

function getRuntimeAuthToken() {
    return currentUser.token || '';
}


function saveSessions() {
    localStorage.setItem('scrna_copilot_sessions_v3', JSON.stringify(sessions));
    localStorage.setItem('scrna_copilot_active_id', activeSessionId);
}

function getActiveSession() {
    return sessions.find(x => x.id === activeSessionId) || sessions[0];
}

function safeMarkdown(markdown) {
    const raw = marked.parse(markdown || '');
    return window.DOMPurify ? DOMPurify.sanitize(raw, { ADD_ATTR: ['target'] }) : raw;
}

function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m]));
}

function escapeAttr(str) {
    return String(str ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, ' ');
}

function normalizeAssetUrl(href) {
    if (!href) return '';
    if (href.startsWith('http') || href.startsWith('data:')) return href;
    if (href.startsWith('/')) return EXPLORER_BASE + href;
    return EXPLORER_BASE + '/' + href.replace(/^\.?\//, '');
}

function pathToUrl(path) {
    if (!path) return '';
    if (path.startsWith('http') || path.startsWith('data:')) return path;
    let p = path.replace(/\\/g, '/');
    if (p.startsWith('/output/')) return EXPLORER_BASE + p;
    if (p.startsWith('output/')) return EXPLORER_BASE + '/' + p;
    if (p.startsWith('/data/')) return EXPLORER_BASE + p;
    if (p.startsWith('data/')) return EXPLORER_BASE + '/' + p;
    if (p.startsWith('/skill/')) return EXPLORER_BASE + p;
    if (p.startsWith('skill/')) return EXPLORER_BASE + '/' + p;
    if (p.startsWith('/plots/')) return EXPLORER_BASE + p;
    if (p.startsWith('plots/')) return EXPLORER_BASE + '/' + p;
    if (p.startsWith('/')) return EXPLORER_BASE + p;
    return EXPLORER_BASE + '/output/' + p;
}

function shortPath(path) {
    return String(path || '').replace(/^https?:\/\/[^/]+/, '').replace(/^\/+/, '').replace(/^output\//, 'output/').replace(/^data\//, 'data/').replace(/^skill\//, 'skill/').replace(/^plots\//, 'plots/');
}

function formatDuration(ms) {
    if (!ms || ms < 0) return '0.0s';
    if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return `${m}m ${s}s`;
}

function formatRelative(ts) {
    if (!ts) return '';
    const diff = Date.now() - ts;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' min ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' h ago';
    return new Date(ts).toLocaleDateString();
}

function updateStatus(ok) {
    document.getElementById('status-dot').className = `w-1.5 h-1.5 rounded-full ${ok ? 'bg-emerald-500' : 'bg-red-500'}`;
    document.getElementById('status-text').innerText = ok ? "Connected" : "Disconnected";
}

function toggleSidebarCollapse() {
    document.body.classList.toggle('sidebar-collapsed');
    localStorage.setItem('scrna_copilot_sidebar_collapsed', document.body.classList.contains('sidebar-collapsed') ? 'true' : 'false');
}

function renderSessionList() {
    const list = document.getElementById('session-list');
    const q = (document.getElementById('session-search')?.value || '').toLowerCase().trim();
    list.innerHTML = "";
    sessions
        .filter(s => !q || s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q))
        .forEach((s) => {
            const latestRun = [...(s.runs || [])].sort((a, b) => (b.startedAt || 0) - (a.startedAt || 0))[0];
            const status = latestRun?.status || 'idle';
            const statusClass = {
                running: 'bg-amber-400',
                success: 'bg-emerald-400',
                failed: 'bg-red-400',
                interrupted: 'bg-orange-400',
                idle: 'bg-gray-600'
            }[status] || 'bg-gray-600';

            const btn = document.createElement('button');
            btn.className = `session-item w-full flex items-center gap-2 p-2.5 rounded-lg text-left text-[12px] text-gray-300 hover:bg-white/5 transition-all border border-transparent ${s.id === activeSessionId ? 'active text-indigo-300' : ''}`;
            btn.onclick = () => switchSession(s.id);
            btn.innerHTML = `
                <span class="relative shrink-0">
                    <svg class="w-3.5 h-3.5 ${s.id === activeSessionId ? 'text-indigo-500' : 'text-gray-500'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    <span class="absolute -right-1 -bottom-1 w-1.5 h-1.5 rounded-full ${statusClass}"></span>
                </span>
                <span class="min-w-0 flex-1">
                    <span class="session-title-text block truncate">${escapeHtml(s.name)}</span>
                    <span class="session-meta-text block text-[10px] text-gray-600 truncate">${latestRun ? `${status} · ${formatRelative(latestRun.startedAt)}` : 'No runs yet'}</span>
                </span>`;
            list.appendChild(btn);
        });
}

function createSession() {
    const newId = 's_' + Date.now();
    sessions.unshift({ id: newId, name: `New Pipeline ${sessions.length + 1}`, chats: [], runs: [], createdAt: Date.now(), updatedAt: Date.now() });
    activeSessionId = newId;
    saveSessions();
    switchSession(newId);
}

function switchSession(id) {
    activeSessionId = id;
    saveSessions();
    renderSessionList();

    const s = getActiveSession();
    document.getElementById('current-session-title').innerText = s.name;
    document.getElementById('session-run-count').innerText = `${s.runs.length || 0} runs`;
    const chatBox = document.getElementById('chat-history-container');
    chatBox.innerHTML = `
        <div class="flex space-x-3 group w-full">
            <div class="w-6 h-6 rounded-md bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center shrink-0 mt-0.5"><svg class="w-3.5 h-3.5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
            <div class="space-y-1 min-w-0">
                <span class="text-[11px] font-semibold text-gray-300">System</span>
                <div class="text-[13px] text-gray-400 leading-relaxed">Session loaded. Workspace is scoped to current session.</div>
            </div>
        </div>`;

    s.chats.forEach(c => renderHistoricalMessage(c, false));
    const lastAgentMsg = [...s.chats].reverse().find(c => c.role === 'agent');
    if (lastAgentMsg) {
        previewReport(lastAgentMsg.id);
    } else {
        renderWorkspaceEmpty();
    }
    refreshWorkspace();
}

async function clearCurrentSession() {
    if (isRunning) return;
    await fetch(`${API_BASE}/api/clear`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: activeSessionId, username: getRuntimeUsername(), auth_token: getRuntimeAuthToken() }) }).catch(() => {});
    const s = getActiveSession();
    s.chats = [];
    s.runs = [];
    s.updatedAt = Date.now();
    saveSessions();
    switchSession(activeSessionId);
}

function setUIState(running) {
    isRunning = running;
    document.getElementById('icon-send').classList.toggle('hidden', running);
    document.getElementById('icon-stop').classList.toggle('hidden', !running);
    document.getElementById('user-query-input').disabled = running;
    if (!running) {
        clearInterval(timerInterval);
        clearInterval(pollInterval);
        if (currentAiMsgId) {
            const traceDetail = document.getElementById(`trace-details-${currentAiMsgId}`);
            if (traceDetail) traceDetail.removeAttribute('open');
        }
    }
}

function createRunRecord(query, aiMsgId) {
    const runId = 'run_' + Date.now();
    const run = {
        id: runId,
        aiMsgId,
        query,
        status: 'running',
        startedAt: Date.now(),
        endedAt: null,
        durationMs: 0,
        failedStep: null,
        steps: PIPELINE_STEPS.map((s, i) => ({ ...s, status: i === 0 ? 'running' : 'pending' })),
        logs: [],
        artifacts: [],
        output: ''
    };
    const s = getActiveSession();
    if (!Array.isArray(s.runs)) s.runs = [];
    s.runs.unshift(run);
    s.updatedAt = Date.now();
    saveSessions();
    renderSessionList();
    document.getElementById('session-run-count').innerText = `${s.runs.length || 0} runs`;
    return run;
}

function getRun(runId) {
    const s = getActiveSession();
    return (s.runs || []).find(r => r.id === runId);
}

function inferStepKeyFromLog(log) {
    const text = `${log.step || ''} ${log.message || ''}`.toLowerCase();
    for (const step of PIPELINE_STEPS) {
        if (step.keywords.some(k => text.includes(k.toLowerCase()))) return step.key;
    }
    return null;
}

function updateRunFromLogs(runId, logs) {
    const run = getRun(runId);
    if (!run) return;
    run.logs = logs.map(l => ({ ...l }));
    let highestTouchedIndex = -1;

    logs.forEach(log => {
        let idx = -1;
        if (log.step_id) {
            idx = run.steps.findIndex(s => s.key === log.step_id);
        }
        if (idx < 0) {
            const key = inferStepKeyFromLog(log);
            if (key) {
                idx = run.steps.findIndex(s => s.key === key);
            }
        }
        if (idx < 0) return;
        highestTouchedIndex = Math.max(highestTouchedIndex, idx);
        if (log.status === 'error' || log.status === 'failed') {
            run.steps[idx].status = 'failed';
            run.failedStep = run.steps[idx].label;
            run.status = 'failed';
        } else if (log.status === 'success' || log.status === 'done') {
            run.steps[idx].status = 'done';
        } else if (run.steps[idx].status !== 'done') {
            run.steps[idx].status = 'running';
        }
    });

    if (run.status !== 'failed' && highestTouchedIndex >= 0) {
        run.steps.forEach((s, i) => {
            if (i < highestTouchedIndex && s.status !== 'failed') s.status = 'done';
            if (i === highestTouchedIndex && s.status === 'pending') s.status = 'running';
        });
    }

    renderRunCard(runId);
    if (workspaceView === 'logs') renderWorkspaceLogs();
    saveSessions();
}

function completeRun(runId, status, outputOrError) {
    const run = getRun(runId);
    if (!run) return;
    run.status = status;
    run.endedAt = Date.now();
    run.durationMs = run.endedAt - run.startedAt;
    if (status === 'success') {
        run.failedStep = null;
        run.output = outputOrError || '';
        run.steps.forEach(s => s.status = 'done');
        run.artifacts = mergeArtifacts(run.artifacts, extractArtifactsFromMarkdown(outputOrError || '', runId));
    } else {
        run.error = outputOrError || '';
        const failed = run.steps.find(s => s.status === 'failed') || run.steps.find(s => s.status === 'running') || run.steps[0];
        if (failed) {
            failed.status = 'failed';
            run.failedStep = failed.label;
        }
    }
    renderRunCard(runId);
    renderSessionList();
    refreshWorkspace();
    saveSessions();
}

function mergeArtifacts(current, incoming) {
    const map = new Map();
    [...(current || []), ...(incoming || [])].forEach(a => {
        if (!a || !a.path) return;
        map.set(a.path, a);
    });
    return Array.from(map.values());
}

        currentText += fullMarkdown.substring(i, i + chunkSize);

    previewReport(msgId);

/* Workspace */
async function loadIgnoreRules() {
    const candidates = [`${EXPLORER_BASE}/api/workspace/ignore`, `${EXPLORER_BASE}/output/.ignore`, `${EXPLORER_BASE}/.ignore`];
    for (const url of candidates) {
        try {
            const res = await fetch(url);
            if (!res.ok) continue;
            const text = await res.text();
            ignoreRules = [...DEFAULT_IGNORE_RULES, ...text.split(/\r?\n/).map(x => x.trim()).filter(x => x && !x.startsWith('#'))];
            return;
        } catch {}
    }
}

function shouldIgnore(path) {
    const p = String(path || '').replace(/\\/g, '/');
    const base = p.split('/').pop();
    return ignoreRules.some(rule => {
        if (!rule) return false;
        const r = rule.replace(/\\/g, '/');
        if (r.endsWith('/')) return p.includes('/' + r.slice(0, -1) + '/') || p.startsWith(r.slice(0, -1) + '/');
        if (r.includes('*')) {
            const re = new RegExp('^' + r.split('*').map(x => x.replace(/[.+?^${}()|[\]\\]/g, '\\$&')).join('.*') + '$');
            return re.test(base) || re.test(p);
        }
        return base === r || p === r || p.includes('/' + r + '/');
    });
}

function getExt(path) {
    return (String(path || '').split('?')[0].split('.').pop() || '').toLowerCase();
}

function getFileType(path) {
    const ext = getExt(path);
    if (ext === 'png') return 'image';
    if (['csv', 'tsv'].includes(ext)) return 'table';
    if (['md', 'markdown'].includes(ext)) return 'markdown';
    if (['py', 'r', 'sh', 'js', 'ts', 'html', 'css', 'json', 'yaml', 'yml', 'toml', 'sql'].includes(ext)) return 'code';
    if (['txt', 'log'].includes(ext)) return 'text';
    return 'download';
}

function extractArtifactsFromMarkdown(markdown, runId = null) {
    const artifacts = [];
    const imgRegex = /!\[([^\]]*)\]\(([^)]+)\)/g;
    const linkRegex = /\[([^\]]+)\]\(([^)]+)\)/g;
    let m;
    while ((m = imgRegex.exec(markdown || '')) !== null) {
        const path = m[2].replace(/^['"]|['"]$/g, '').trim();
        if (!path || shouldIgnore(path)) continue;
        artifacts.push({ path, url: normalizeAssetUrl(path), name: m[1] || shortPath(path).split('/').pop(), type: 'image', runId });
    }
    while ((m = linkRegex.exec(markdown || '')) !== null) {
        const path = m[2].replace(/^['"]|['"]$/g, '').trim();
        if (!path || path.startsWith('http') || shouldIgnore(path)) continue;
        const type = getFileType(path);
        artifacts.push({ path, url: pathToUrl(path), name: m[1] || shortPath(path).split('/').pop(), type, runId });
    }
    return artifacts;
}

function collectSessionArtifacts() {
    const s = getActiveSession();
    let artifacts = [];
    (s.runs || []).forEach(run => {
        artifacts = mergeArtifacts(artifacts, (run.artifacts || []).map(a => ({ ...a, runId: run.id })));
        if (run.output) artifacts = mergeArtifacts(artifacts, extractArtifactsFromMarkdown(run.output, run.id));
        artifacts.push({
            path: `run://${run.id}/report.md`,
            name: `${run.id}_report.md`,
            type: 'markdown',
            source: 'run',
            content: run.output || '',
            runId: run.id
        });
        artifacts.push({
            path: `run://${run.id}/logs.json`,
            name: `${run.id}_logs.json`,
            type: 'json',
            source: 'run',
            content: JSON.stringify(run.logs || [], null, 2),
            runId: run.id
        });
    });
    (s.chats || []).filter(c => c.role === 'agent').forEach(chat => {
        artifacts = mergeArtifacts(artifacts, extractArtifactsFromMarkdown(chat.text, chat.runId));
    });
    return artifacts.filter(a => a && a.path && !shouldIgnore(a.path));
}

async function fetchWorkspaceTree() {
    const runId = currentRunId || '';
    const root = document.getElementById('workspace-root')?.value || 'all';
    const urls = [
        `${EXPLORER_BASE}/api/workspace/tree?session_id=${encodeURIComponent(activeSessionId)}&run_id=${encodeURIComponent(runId)}&root=${encodeURIComponent(root)}`,
        `${EXPLORER_BASE}/api/artifacts?session_id=${encodeURIComponent(activeSessionId)}&run_id=${encodeURIComponent(runId)}&root=${encodeURIComponent(root)}`
    ];
    for (const url of urls) {
        try {
            const res = await fetch(url);
            if (!res.ok) continue;
            const data = await res.json();
            const files = Array.isArray(data) ? data : (data.files || data.artifacts || []);
            if (files.length) {
                return files.map(f => ({
                    path: f.path || f.url || f.name,
                    url: f.url || pathToUrl(f.path || f.name),
                    name: f.name || String(f.path || '').split('/').pop(),
                    type: f.type || getFileType(f.path || f.url || f.name),
                    runId: f.run_id || f.runId || null
                })).filter(f => !shouldIgnore(f.path));
            }
        } catch {}
    }
    return collectSessionArtifacts();
}

async function refreshWorkspace() {
    const status = document.getElementById('workspace-status');
    if (status) status.innerText = 'loading...';
    window.__workspaceFiles = await fetchWorkspaceTree();
    renderFileTree();
    renderCurrentWorkspaceView();
    if (status) status.innerText = `${window.__workspaceFiles.length} files`;
}

function buildTree(files) {
    const root = { name: 'workspace', type: 'dir', children: {}, path: '' };
    files.forEach(file => {
        const normalized = shortPath(file.path).replace(/^\/+/, '');
        let parts = normalized.split('/').filter(Boolean);

        // Simplify hierarchy: strip nested guest and run/session folders
        if (parts.length > 0) {
            if (parts[0] === 'output') {
                if (parts.length >= 3 && parts[2].startsWith('run_')) {
                    parts = ['output'].concat(parts.slice(3));
                }
            } else if (parts[0] === 'workspace') {
                if (parts.length >= 3 && parts[2].startsWith('session_')) {
                    parts = ['workspace'].concat(parts.slice(3));
                }
            } else if (parts[0] === 'run:' || parts[0] === 'run') {
                parts[0] = 'run';
                parts = parts.filter(p => p && !p.startsWith('run_'));
            }
        }

        let node = root;
        parts.forEach((part, idx) => {
            const isFile = idx === parts.length - 1;
            if (!node.children[part]) {
                node.children[part] = {
                    name: part,
                    type: isFile ? 'file' : 'dir',
                    children: {},
                    path: parts.slice(0, idx + 1).join('/'),
                    file: isFile ? file : null
                };
            }
            node = node.children[part];
        });
    });
    return root;
}

function renderFileTree(runFilterId = null) {
    const treeEl = document.getElementById('file-tree');
    const filter = (document.getElementById('file-filter')?.value || '').toLowerCase().trim();
    let files = window.__workspaceFiles || collectSessionArtifacts();
    if (runFilterId) files = files.filter(f => !f.runId || f.runId === runFilterId);
    if (filter) files = files.filter(f => `${f.path} ${f.name}`.toLowerCase().includes(filter));
    files = files.filter(f => !shouldIgnore(f.path));

    if (!files.length) {
        treeEl.innerHTML = `
            <div class="p-4 text-center text-gray-600 text-[12px] leading-relaxed">
                暂无 artifacts。<br/>
                运行完成后会显示报告、图片、CSV 和日志。<br/>
                若需要完整文件夹浏览，请后端提供 <span class="mono text-gray-500">/api/workspace/tree</span>。
            </div>`;
        return;
    }

    const tree = buildTree(files);
    if (!localStorage.getItem('scrna_folder_state_initialized_v1')) {
        collectFolderKeys(tree).forEach(k => collapsedFolders.add(k));
        localStorage.setItem('scrna_collapsed_folders_v1', JSON.stringify(Array.from(collapsedFolders)));
        localStorage.setItem('scrna_folder_state_initialized_v1', 'true');
    }
    if (!localStorage.getItem('scrna_folder_run_collapsed_v1')) {
        collapsedFolders.add('run');
        collapsedFolders.add('run:');
        localStorage.setItem('scrna_collapsed_folders_v1', JSON.stringify(Array.from(collapsedFolders)));
        localStorage.setItem('scrna_folder_run_collapsed_v1', 'true');
    }
    if (!localStorage.getItem('scrna_folder_data_collapsed_v1')) {
        collapsedFolders.add('data');
        collapsedFolders.add('data:');
        localStorage.setItem('scrna_collapsed_folders_v1', JSON.stringify(Array.from(collapsedFolders)));
        localStorage.setItem('scrna_folder_data_collapsed_v1', 'true');
    }
    treeEl.innerHTML = renderTreeNode(tree, 0);
}

function collectFolderKeys(node) {
    let keys = [];
    if (node && node.type === 'dir' && node.path) keys.push(node.path);
    Object.values(node.children || {}).forEach(child => {
        if (child.type === 'dir') keys = keys.concat(collectFolderKeys(child));
    });
    return keys;
}

function renderTreeNode(node, depth) {
    if (node.type === 'file') {
        const file = node.file;
        const icon = fileIcon(file.type || getFileType(file.path));
        const pathKey = escapeAttr(file.path);
        const active = activeFilePath === file.path ? 'active' : '';
        return `
            <button draggable="true" ondragstart="event.dataTransfer.setData('text/plain', '${pathKey}')" class="file-row ${active} w-full flex items-center gap-1.5 px-2 py-1 rounded text-left text-[11px] text-gray-400" style="padding-left:${depth * 12 + 8}px" onclick="openFileByPath('${pathKey}')">
                ${icon}
                <span class="truncate">${escapeHtml(file.name || node.name)}</span>
            </button>`;
    }

    const children = Object.values(node.children || {}).sort((a, b) => {
        if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
        return a.name.localeCompare(b.name);
    });

    const folderKey = node.path || node.name || 'workspace';
    const isRoot = depth === 0;
    const collapsed = !isRoot && collapsedFolders.has(folderKey);
    const arrow = collapsed ? '▸' : '▾';
    const childCount = children.length;

    const folderLine = isRoot ? `
        <div class="px-2 py-1.5 text-[10px] text-gray-500 uppercase tracking-wider font-semibold flex items-center gap-1.5">
            <span class="text-gray-600">▾</span>
            <svg class="w-3.5 h-3.5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
            <span>${escapeHtml(node.name)}</span>
            <span class="mono text-[9px] text-gray-700 ml-auto">${childCount}</span>
        </div>` : `
        <button class="w-full px-2 py-1 text-[11px] text-gray-500 flex items-center gap-1.5 rounded hover:bg-white/5 text-left" style="padding-left:${depth * 12 + 8}px" onclick="toggleFolderNode('${escapeAttr(folderKey)}')">
            <span class="w-3 text-gray-600">${arrow}</span>
            <svg class="w-3.5 h-3.5 text-gray-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7h7l2 2h9v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
            <span class="truncate">${escapeHtml(node.name)}</span>
            <span class="mono text-[9px] text-gray-700 ml-auto">${childCount}</span>
        </button>`;

    if (collapsed) return folderLine;
    return folderLine + children.map(child => renderTreeNode(child, depth + 1)).join('');
}

function toggleFolderNode(folderKey) {
    if (collapsedFolders.has(folderKey)) collapsedFolders.delete(folderKey);
    else collapsedFolders.add(folderKey);
    localStorage.setItem('scrna_collapsed_folders_v1', JSON.stringify(Array.from(collapsedFolders)));
    renderFileTree();
}

function toggleExpandAll() {
    const tree = buildTree(window.__workspaceFiles || collectSessionArtifacts());
    const allKeys = collectFolderKeys(tree);
    const anyCollapsed = allKeys.some(k => collapsedFolders.has(k));
    if (anyCollapsed) {
        collapsedFolders.clear();
    } else {
        allKeys.forEach(k => collapsedFolders.add(k));
    }
    localStorage.setItem('scrna_collapsed_folders_v1', JSON.stringify(Array.from(collapsedFolders)));
    renderFileTree();
}

function fileIcon(type) {
    if (type === 'image') return '<span class="text-emerald-400">▧</span>';
    if (type === 'table') return '<span class="text-amber-400">▦</span>';
    if (type === 'markdown') return '<span class="text-indigo-400">M</span>';
    if (type === 'code') return '<span class="text-purple-400">&lt;/&gt;</span>';
    if (type === 'text') return '<span class="text-sky-400">T</span>';
    return '<span class="text-gray-500">↓</span>';
}

function openFileByPath(path) {
    const files = window.__workspaceFiles || collectSessionArtifacts();
    const file = files.find(f => f.path === path);
    if (file) openFile(file);
}

async function openFile(file) {
    if (!file) return;
    activeFilePath = file.path;
    if (!openedFiles.find(f => f.path === file.path)) openedFiles.push(file);
    renderEditorTabs();

    if (workspaceView === 'explorer') {
        if (file.type === 'image') setWorkspaceView('gallery', false);
        else if (file.type === 'table') setWorkspaceView('tables', false);
        else if (file.type === 'markdown') setWorkspaceView('report', false);
    }
    await renderFilePreview(file);
    renderFileTree();
}

function renderEditorTabs() {
    const tabs = document.getElementById('editor-tabs');
    if (!openedFiles.length) {
        tabs.innerHTML = `<div class="px-3 text-[11px] text-gray-600">No opened files</div>`;
        return;
    }
    tabs.innerHTML = openedFiles.map(f => `
        <button class="editor-tab ${activeFilePath === f.path ? 'active' : ''} h-full flex items-center gap-2 px-3 border-t border-transparent border-r border-white/5 text-[11px] text-gray-400 hover:text-gray-200 min-w-0" onclick="openFileByPath('${escapeAttr(f.path)}')">
            <span class="truncate max-w-[180px]">${escapeHtml(f.name || shortPath(f.path).split('/').pop())}</span>
            <span onclick="event.stopPropagation(); closeEditorTab('${escapeAttr(f.path)}')" class="text-gray-600 hover:text-red-300">×</span>
        </button>`).join('');
}

function closeEditorTab(path) {
    openedFiles = openedFiles.filter(f => f.path !== path);
    if (activeFilePath === path) {
        activeFilePath = openedFiles[0]?.path || null;
        if (activeFilePath) openFileByPath(activeFilePath);
        else renderCurrentWorkspaceView();
    }
    renderEditorTabs();
}

function setWorkspaceView(view, rerender = true) {
    workspaceView = view;
    ['explorer', 'report', 'gallery', 'tables', 'logs'].forEach(v => {
        document.getElementById(`tab-${v}`)?.classList.toggle('active', v === view);
    });
    if (rerender) renderCurrentWorkspaceView();
}

function renderCurrentWorkspaceView() {
    if (activeFilePath) {
        const f = (window.__workspaceFiles || collectSessionArtifacts()).find(x => x.path === activeFilePath);
        if (f && ['report', 'tables', 'gallery', 'explorer'].includes(workspaceView)) {
            renderFilePreview(f);
            return;
        }
    }
    if (workspaceView === 'gallery') renderWorkspaceGallery();
    else if (workspaceView === 'tables') renderWorkspaceTables();
    else if (workspaceView === 'logs') renderWorkspaceLogs();
    else if (workspaceView === 'report') renderLatestReport();
    else renderWorkspaceEmpty();
}

function renderWorkspaceEmpty() {
    document.getElementById('workspace-content').innerHTML = `
        <div class="h-full flex flex-col items-center justify-center text-gray-600 space-y-4">
            <svg class="w-12 h-12 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>

function renderLatestReport() {

    if (last) {
        openFile({ path: `report://${last.id}`, name: `report_${last.id}.md`, type: 'markdown', content: last.text, source: 'message', runId: last.runId });

async function fetchTextSafe(url) {
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('fetch failed');
        return await res.text();
    } catch {
        return '';
    }
}

function renderCsvPreview(text, file, url, truncated=false) {
    const rows = parseDelimited(text || '', getExt(file.path) === 'tsv' ? '\t' : ',').slice(0, 20);
    const header = rows[0] || [];
    const body = rows.slice(1);
    return `
        <div class="h-full overflow-auto bg-[#000]">
            <div class="px-4 py-3 border-b panel-divider flex items-center justify-between bg-[#0A0A0A] sticky top-0 z-10">
                <div>
                    <div class="text-sm text-gray-200 font-medium">${escapeHtml(file.name || shortPath(file.path).split('/').pop())}</div>
                    <div class="text-[11px] text-gray-600 mono mt-1">${escapeHtml(shortPath(file.path))}${truncated ? ' · large file, preview limited' : ''}</div>
                </div>
                <a href="${escapeHtml(url)}" class="text-[11px] px-3 py-1.5 rounded-md border border-white/10 bg-white/[0.03] hover:bg-white/[0.07] text-gray-300">Download CSV</a>
            </div>
            <div class="p-4">
                <div class="text-[11px] text-gray-600 mb-2">仅预览前 20 行，大表请下载查看。</div>
                <div class="overflow-auto rounded-xl border border-white/10">
                    <table class="w-full border-collapse text-[11px]">
                        <thead><tr>${header.map(h => `<th class="bg-[#111] text-gray-300 text-left px-3 py-2 border-b border-white/10">${escapeHtml(h)}</th>`).join('')}</tr></thead>
                        <tbody>${body.map(r => `<tr>${header.map((_, i) => `<td class="px-3 py-2 border-b border-white/5 text-gray-400">${escapeHtml(r[i] || '')}</td>`).join('')}</tr>`).join('')}</tbody>
                    </table>
                </div>
            </div>
        </div>`;
}


function parseDelimited(text, delim) {
    const lines = String(text || '').split(/\r?\n/).filter(Boolean);
    return lines.map(line => {
        const out = [];
        let cur = '', q = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
            else if (ch === '"') q = !q;
            else if (ch === delim && !q) { out.push(cur); cur = ''; }
            else cur += ch;
        }
        out.push(cur);
        return out;
    });
}

function initResizableLayout() {
    const sidebar = document.getElementById('left-sidebar');
    const chat = document.getElementById('chat-panel');

    const savedSidebar = localStorage.getItem('scrna_layout_sidebar_w');
    const savedChat = localStorage.getItem('scrna_layout_chat_w');

    if (savedSidebar) document.documentElement.style.setProperty('--sidebar-w', savedSidebar);
    if (savedChat) document.documentElement.style.setProperty('--chat-w', savedChat);

    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    document.querySelectorAll('.resize-handle').forEach(handle => {
        handle.addEventListener('mousedown', (e) => {
            if (document.body.classList.contains('workspace-fullscreen')) return;
            e.preventDefault();

            const mode = handle.dataset.resize;
            const startX = e.clientX;
            const startSidebarW = sidebar.getBoundingClientRect().width;
            const startChatW = chat.getBoundingClientRect().width;
            const viewportW = window.innerWidth;

            handle.classList.add('active');
            document.body.classList.add('is-resizing');

            const onMove = (ev) => {
                const dx = ev.clientX - startX;

                if (mode === 'sidebar') {
                    const next = clamp(startSidebarW + dx, 60, Math.min(560, viewportW * 0.45));
                    document.documentElement.style.setProperty('--sidebar-w', `${next}px`);
                    localStorage.setItem('scrna_layout_sidebar_w', `${next}px`);
                    if (next > 80 && document.body.classList.contains('sidebar-collapsed')) {
                        document.body.classList.remove('sidebar-collapsed');
                        localStorage.setItem('scrna_copilot_sidebar_collapsed', 'false');
                    }
                }

                if (mode === 'chat') {
                    const next = clamp(startChatW + dx, 320, Math.min(820, viewportW * 0.7));
                    document.documentElement.style.setProperty('--chat-w', `${next}px`);
                    localStorage.setItem('scrna_layout_chat_w', `${next}px`);
                }
            };

            const onUp = () => {
                handle.classList.remove('active');
                document.body.classList.remove('is-resizing');
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            };

            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        });
    });
}

function initDragAndDrop() {
    const textarea = document.getElementById('user-query-input');
    if (!textarea) return;

    textarea.addEventListener('dragover', (e) => {
        e.preventDefault();
        textarea.classList.add('border-indigo-500/80');
        textarea.classList.add('bg-[#1a1a1a]');
    });

    textarea.addEventListener('dragleave', () => {
        textarea.classList.remove('border-indigo-500/80');
        textarea.classList.remove('bg-[#1a1a1a]');
    });

    textarea.addEventListener('drop', (e) => {
        e.preventDefault();
        textarea.classList.remove('border-indigo-500/80');
        textarea.classList.remove('bg-[#1a1a1a]');
        let path = e.dataTransfer.getData('text/plain');
        if (path) {
            if (path.startsWith('/') || path.includes('/') || path.includes('\\')) {
                const filename = path.replace(/\\/g, '/').split('/').pop();
                path = `[${filename}](${path})`;
            }
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            textarea.value = text.substring(0, start) + path + text.substring(end);
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + path.length;
            textarea.style.height = '';
            textarea.style.height = textarea.scrollHeight + 'px';
        }
    });
}

async function uploadFiles(kind, fileList) {
    const files = Array.from(fileList || []);
    if (!files.length) return;

    const form = new FormData();
    files.forEach(f => form.append('files', f));

    const endpoint = kind === 'skill' ? '/api/upload/skill' : '/api/upload/data';
    const status = document.getElementById('workspace-status');
    if (status) status.innerText = `uploading ${files.length} file(s)...`;

    try {
        const res = await fetch(`${EXPLORER_BASE}${endpoint}`, { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'upload failed');

        const saved = [...(data.saved || []), ...(data.extracted || [])];
        if (status) status.innerText = `uploaded ${saved.length} file(s)`;
        await refreshWorkspace();
    } catch (err) {
        if (status) status.innerText = `upload failed`;
        alert(`上传失败：${err.message}`);
    } finally {
        const input = kind === 'skill' ? document.getElementById('skill-upload-input') : document.getElementById('data-upload-input');
        if (input) input.value = '';
    }
}

async function loginSettings() {
    const account = document.getElementById('login-account-input').value.trim();
    const password = document.getElementById('login-password-input').value.trim();
    if (!account || !password) return;

    try {
        const res = await fetch(`${API_BASE}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ account, password })
        });
        const data = await res.json();

        currentUser = {

<script>
/* =========================
   V4 Generic Skill Orchestrator overrides
   Complete generic skill orchestration:
   - Plan → Confirm → Run
   - preflight
   - run_manifest.json + events.jsonl
   - output/<username>/<run_id>
   - run summary
   - run workspace view
   ========================= */

let pendingPlans = {};
let runStatusPollInterval = null;

function ensureRunArray() {
    const s = getActiveSession();
    if (!Array.isArray(s.runs)) s.runs = [];
    return s.runs;
}

function normalizeStepStatus(status) {
    if (status === 'success') return 'done';
    if (status === 'error') return 'failed';
    return status || 'pending';
}

function getRuntimeUsername() {
    return (window.currentUser && currentUser.username) || localStorage.getItem('scrna_username') || 'guest';
}

function getRuntimeAuthToken() {
    return (window.currentUser && currentUser.token) || '';
}

function createRunRecordFromPlan(planData, query) {
    const runs = ensureRunArray();
    const steps = (planData.plan?.steps || []).map((x, i) => ({
        key: x.id || `step_${i + 1}`,
        label: x.title || x.name || x.skill || `Step ${i + 1}`,
        status: 'pending',
        description: x.description || '',
        skill: x.skill || '',
        command: x.command || '',
        args: x.args || ''
    }));

    const run = {
        id: planData.run_id,
        aiMsgId: null,
        query,
        status: 'planned',
        startedAt: planData.started_at ? new Date(planData.started_at).getTime() : Date.now(),
        endedAt: null,
        durationMs: 0,
        failedStep: null,
        steps,
        logs: [],
        artifacts: [],
        output: '',
        plan: planData.plan || {},
        preflight: planData.preflight || {},
        manifestPath: planData.manifest_path,
        outputDir: planData.output_dir,
        eventsPath: planData.events_path,
        summaryPath: planData.summary_path,
        username: planData.username || getRuntimeUsername()
    };

    runs.unshift(run);
    getActiveSession().updatedAt = Date.now();
    saveSessions();
    renderSessionList();
    document.getElementById('session-run-count').innerText = `${runs.length || 0} runs`;
    return run;
}

function renderPlanCard(run) {
    const container = document.getElementById('chat-history-container');
    const plan = run.plan || {};
    const preflight = run.preflight || {};
    const steps = plan.steps || [];
    const warnings = preflight.warnings || [];
    const errors = preflight.errors || [];
    const inputs = preflight.inputs || [];
    const outputs = preflight.outputs || [];

    const stepHtml = steps.length ? steps.map((s, i) => `
        <div class="rounded-lg border border-white/10 bg-white/[0.025] px-3 py-2">
            <div class="flex items-center justify-between gap-3">
                <div class="text-[12px] text-gray-200">${i + 1}. ${escapeHtml(s.title || s.name || s.id || 'Step')}</div>
                ${s.skill ? `<span class="mono text-[10px] text-indigo-300">${escapeHtml(s.skill)}</span>` : ''}
            </div>
            ${s.description ? `<div class="text-[11px] text-gray-500 mt-1">${escapeHtml(s.description)}</div>` : ''}
            ${s.args ? `<div class="mono text-[10px] text-gray-600 mt-1 break-all">${escapeHtml(s.args)}</div>` : ''}
        </div>`).join('') : `<div class="text-[12px] text-gray-600">No plan steps generated.</div>`;

    const preflightHtml = `
        <div class="rounded-lg border ${preflight.ok ? 'border-emerald-500/20 bg-emerald-500/5' : 'border-amber-500/20 bg-amber-500/5'} px-3 py-2">
            <div class="${preflight.ok ? 'text-emerald-300' : 'text-amber-300'} text-[12px] font-medium">
                Preflight: ${preflight.ok ? 'OK' : 'Needs Attention'}
            </div>
            ${inputs.length ? `<div class="mt-2 text-[11px] text-gray-400">Inputs: ${inputs.map(x => escapeHtml(x)).join(', ')}</div>` : ''}
            ${outputs.length ? `<div class="mt-1 text-[11px] text-gray-400">Outputs: ${outputs.map(x => escapeHtml(x)).join(', ')}</div>` : ''}
            ${errors.length ? `<div class="mt-2 text-[11px] text-red-300 space-y-1">${errors.map(e => `<div>• ${escapeHtml(e)}</div>`).join('')}</div>` : ''}
            ${warnings.length ? `<div class="mt-2 text-[11px] text-amber-200/80 space-y-1">${warnings.map(w => `<div>• ${escapeHtml(w)}</div>`).join('')}</div>` : ''}
            ${!errors.length && !warnings.length ? `<div class="mt-1 text-[11px] text-gray-500">输入、输出目录、skill 基础检查通过。</div>` : ''}
        </div>`;

    const html = `
    <div class="flex space-x-3 group w-full" id="plan-card-${run.id}">
        <div class="w-6 h-6 rounded-md flex items-center justify-center shrink-0 border bg-indigo-500/10 border-indigo-500/25 mt-0.5">
            <svg class="w-3.5 h-3.5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 5h6M9 12h6M9 19h6M5 5h.01M5 12h.01M5 19h.01"/></svg>
        </div>
        <div class="flex-1 min-w-0">
            <div class="text-[11px] font-semibold text-gray-300 mb-2">Execution Plan</div>
            <div class="rounded-xl border border-white/10 bg-[#0D0D0D] overflow-hidden shadow-lg">
                <div class="px-4 py-3 border-b border-white/5 flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <div class="mono text-[10px] text-gray-500">${escapeHtml(run.id)}</div>
                        <div class="text-[12px] text-gray-200 mt-1 truncate">${escapeHtml(run.query)}</div>
                    </div>
                    <span class="text-[10px] mono text-gray-500 shrink-0">${escapeHtml(run.outputDir || '')}</span>
                </div>
                <div class="p-3 space-y-3">
                    ${preflightHtml}
                    <div class="space-y-2">${stepHtml}</div>
                    <div class="flex items-center gap-2 pt-1">
                        <button onclick="confirmRun('${run.id}')" class="text-[11px] px-3 py-1.5 rounded-md bg-indigo-600 hover:bg-indigo-500 text-white">确认运行</button>
                        <button onclick="editPlannedRun('${run.id}')" class="text-[11px] px-3 py-1.5 rounded-md border border-white/10 bg-white/[0.03] hover:bg-white/[0.07] text-gray-300">修改指令</button>
                        <button onclick="cancelPlannedRun('${run.id}')" class="text-[11px] px-3 py-1.5 rounded-md border border-red-500/20 bg-red-500/10 hover:bg-red-500/20 text-red-200">取消</button>
                        <button onclick="openRunInWorkspace('${run.id}')" class="ml-auto text-[11px] px-3 py-1.5 rounded-md border border-white/10 bg-white/[0.03] hover:bg-white/[0.07] text-gray-300">打开 Run</button>
                    </div>
                </div>
            </div>
        </div>
    </div>`;
    container.insertAdjacentHTML('beforeend', html);
    container.scrollTop = container.scrollHeight;
}

function editPlannedRun(runId) {
    const run = getRun(runId);
    if (!run) return;
    const input = document.getElementById('user-query-input');
    input.value = run.query;
    input.focus();

    const card = document.getElementById(`plan-card-${runId}`);

async function toggleAction() {
    if (isRunning) {
        await fetch(`${API_BASE}/api/stop`, { method: 'POST' }).catch(() => {});
        if (currentRunId) completeRun(currentRunId, 'interrupted', 'Execution interrupted by user.');
        const errorId = 'err_' + Date.now();
        renderHistoricalMessage({ id: errorId, role: 'error', text: 'Execution interrupted by user.' }, true);
        setUIState(false);
        stopRunStatusPolling();
        return;
    }

    const inputEl = document.getElementById('user-query-input');
    const query = inputEl.value.trim();
    if (!query) return;

    inputEl.value = "";
    inputEl.style.height = 'auto';

    const userMsgId = 'u_' + Date.now();
    renderHistoricalMessage({ id: userMsgId, role: 'user', text: query }, true);

    const currentSess = getActiveSession();
    if (currentSess.chats.length === 1 && currentSess.name.startsWith('New Pipeline')) {
        currentSess.name = query.substring(0, 18) + (query.length > 18 ? '...' : '');
        renderSessionList();
    }

    try {
        const res = await fetch(`${API_BASE}/api/plan`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                query,
                session_id: activeSessionId,
                username: getRuntimeUsername(),
                auth_token: getRuntimeAuthToken()
            })
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'plan failed');

        pendingPlans[data.run_id] = data;
        const run = createRunRecordFromPlan(data, query);
        renderPlanCard(run);
        currentRunId = data.run_id;
        setWorkspaceView('run');
        refreshWorkspace();
    } catch (err) {
        const errId = 'err_' + Date.now();
        renderHistoricalMessage({ id: errId, role: 'error', text: `Plan failed: ${err.message}` }, true);
    }
}
