                        <div class="flex items-center space-x-2">
                            <svg id="icon-spin-${currentAiMsgId}" class="w-3.5 h-3.5 text-indigo-400 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            <svg id="icon-done-${currentAiMsgId}" class="w-3.5 h-3.5 text-emerald-400 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            <span id="summary-${currentAiMsgId}">Running generic skill plan...</span>
                            <svg class="arrow-icon w-3 h-3 text-gray-500 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </div>
                        <span id="timer-${currentAiMsgId}" class="mono text-gray-500">0.0s</span>
                    </summary>
                    <div class="px-3 pt-1 pb-3 border-t border-white/5 max-h-60 overflow-y-auto space-y-1 bg-[#050505]" id="logs-${currentAiMsgId}"></div>
                </details>
                <div id="content-${currentAiMsgId}" class="prose prose-invert max-w-none text-[13px] leading-relaxed text-gray-300 hidden"></div>
                <div id="action-${currentAiMsgId}" class="hidden pt-2">
                    <button onclick="openRunInWorkspace('${runId}')" class="flex items-center space-x-1.5 px-3 py-1.5 rounded-md bg-white/5 hover:bg-white/10 border border-white/10 transition-colors text-[11px] font-medium text-gray-300 hover:text-indigo-300 w-max shadow-sm">
                        <span>打开 Run Workspace</span>
                    </button>
                </div>
            </div>
        </div>`;
    container.insertAdjacentHTML('beforeend', aiSkeleton);
    container.scrollTop = container.scrollHeight;

    setUIState(true);
    renderedLogCount = 0;
    renderedTraceCount = 0;
    latestApiTraces = [];
    startTime = Date.now();

    timerInterval = setInterval(() => {
        const tBox = document.getElementById(`timer-${currentAiMsgId}`);
        if (tBox) tBox.innerText = formatDuration(Date.now() - startTime);
        const runDuration = document.getElementById(`run-duration-${run.id}`);
        if (runDuration) runDuration.innerText = formatDuration(Date.now() - run.startedAt);
    }, 100);

    pollInterval = setInterval(fetchLogs, 500);
    startRunStatusPolling(runId);

    try {
        const res = await fetch(`${API_BASE}/api/run_plan`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                run_id: runId,
                session_id: activeSessionId,
                username: getRuntimeUsername(),
                auth_token: getRuntimeAuthToken()
            })
        });
        const data = await res.json();
        await fetchLogs();

        if (data.output) {
            document.getElementById(`icon-spin-${currentAiMsgId}`)?.classList.add('hidden');
            document.getElementById(`icon-done-${currentAiMsgId}`)?.classList.remove('hidden');
            document.getElementById(`summary-${currentAiMsgId}`).innerText = data.success ? "Run completed" : "Run failed";

            await streamRenderMarkdown(data.output || '', currentAiMsgId);
            document.getElementById(`action-${currentAiMsgId}`)?.classList.remove('hidden');

            const s = getActiveSession();
            s.chats.push({ id: currentAiMsgId, role: 'agent', text: data.output || '', runId: run.id });
        }

        if (!res.ok || !data.success) throw new Error(data.error || "Server error");

        completeRun(run.id, 'success', data.output || '');
        if (data.manifest) {
            const r = getRun(run.id);
            r.manifest = data.manifest;
            r.outputDir = data.manifest.output_dir || r.outputDir;
            r.manifestPath = data.manifest.manifest_path || r.manifestPath;
            r.eventsPath = data.manifest.events_path || r.eventsPath;
            r.summaryPath = data.manifest.summary_path || r.summaryPath;
        }
        saveSessions();
    } catch (err) {
        completeRun(run.id, 'failed', err.message);
        
        const s = getActiveSession();
        const chatExists = s.chats.some(c => c.id === currentAiMsgId);
        if (!chatExists) {
            const errId = 'err_' + Date.now();
            renderHistoricalMessage({ id: errId, role: 'error', text: err.message, runId: run.id }, true);
        }
    } finally {
        setUIState(false);
        stopRunStatusPolling();
        refreshWorkspace();
    }
}

function startRunStatusPolling(runId) {
    stopRunStatusPolling();
    runStatusPollInterval = setInterval(async () => {
        try {
            const res = await fetch(`${API_BASE}/api/runs/${encodeURIComponent(runId)}`);
            if (!res.ok) return;
            const data = await res.json();
            syncRunFromServer(data);
        } catch {}
    }, 1500);
}

function stopRunStatusPolling() {
    if (runStatusPollInterval) clearInterval(runStatusPollInterval);
    runStatusPollInterval = null;
}

function syncRunFromServer(serverRun) {
    const run = getRun(serverRun.id);
    if (!run) return;

    run.status = serverRun.status || run.status;
    run.output = serverRun.output || run.output;
    run.logs = serverRun.logs || run.logs;
    run.artifacts = serverRun.artifacts || run.artifacts;
    run.manifest = serverRun.manifest || run.manifest;
    run.preflight = serverRun.preflight || run.preflight;
    run.outputDir = serverRun.output_dir || run.outputDir;

    if (serverRun.ended_at && serverRun.started_at) {
        run.durationMs = Math.max(0, (new Date(serverRun.ended_at).getTime() || Date.now()) - (new Date(serverRun.started_at).getTime() || Date.now()));
    }

    const manifestSteps = serverRun.manifest?.plan?.steps || [];
    if (manifestSteps.length) {
        run.steps = manifestSteps.map((s, i) => ({
            key: s.id || `step_${i + 1}`,
            label: s.title || s.name || s.skill || `Step ${i + 1}`,
            description: s.description || '',
            skill: s.skill || '',
            status: normalizeStepStatus(s.status || run.steps?.[i]?.status || 'pending')
        }));
    }

    const failed = run.steps.find(s => s.status === 'failed');
    run.failedStep = failed ? failed.label : null;

    renderRunCard(run.id);
    if (workspaceView === 'run') renderWorkspaceRun(false);
    saveSessions();
}

async function fetchLogs() {
    try {
        const url = currentRunId ? `${API_BASE}/api/logs?run_id=${encodeURIComponent(currentRunId)}` : `${API_BASE}/api/logs`;
        const res = await fetch(url);
        const data = await res.json();
        const logBox = document.getElementById(`logs-${currentAiMsgId}`);
        if (currentRunId && Array.isArray(data.logs)) updateRunFromLogs(currentRunId, data.logs);

        for (let i = renderedLogCount; i < (data.logs || []).length; i++) {
            const log = data.logs[i];
            if (logBox) {
                const entry = document.createElement('div');
                entry.className = 'text-[11px] mono leading-5';
                const statusIcon = log.status === 'success' ? '✔' : log.status === 'error' ? '✖' : '➜';
                const statusClass = log.status === 'success' ? 'text-emerald-400' : log.status === 'error' ? 'text-red-400' : 'text-amber-400';
                entry.innerHTML = `<span class="${statusClass} mr-1.5">${statusIcon}</span><span class="text-gray-300">${escapeHtml(log.step || '')}</span>${log.message ? `<div class="pl-4 text-gray-500 mt-0.5 break-all">${escapeHtml(log.message)}</div>` : ''}`;
                logBox.appendChild(entry);
                logBox.scrollTop = logBox.scrollHeight;
            }
        }
        renderedLogCount = (data.logs || []).length;

        if (data.api_traces) latestApiTraces = data.api_traces;
        if (data.api_traces && data.api_traces.length > renderedTraceCount) {
            renderApiTrace(data.api_traces.slice(renderedTraceCount));
            renderedTraceCount = data.api_traces.length;
        }
    } catch(e) {}
}

function updateRunFromLogs(runId, logs) {
    const run = getRun(runId);
    if (!run) return;
    run.logs = logs.map(l => ({ ...l }));

    logs.forEach((log) => {
        let idx = -1;
        if (log.step_id) idx = run.steps.findIndex(s => s.key === log.step_id);
        if (idx < 0 && log.step) idx = run.steps.findIndex(s => (log.step || '').includes(s.label) || (log.step || '').includes(s.skill));
        if (idx < 0) idx = run.steps.findIndex(s => s.status === 'running');
        if (idx < 0) idx = run.steps.findIndex(s => s.status === 'pending');
        if (idx < 0) return;

        if (log.status === 'error') {
            run.steps[idx].status = 'failed';
            run.failedStep = run.steps[idx].label;
            run.status = 'failed';
        } else if (log.status === 'success') {
            run.steps[idx].status = 'done';
            const next = run.steps.find(s => s.status === 'pending');
            if (next && run.status === 'running') next.status = 'running';
        } else if (run.steps[idx].status === 'pending') {
            run.steps[idx].status = 'running';
        }
    });

    renderRunCard(runId);
    if (workspaceView === 'logs') renderWorkspaceLogs();
    if (workspaceView === 'run') renderWorkspaceRun(false);
    saveSessions();
}

function openRunInWorkspace(runId) {
    currentRunId = runId;
    setWorkspaceView('run');
    renderFileTree();
    refreshWorkspace();
}

function setWorkspaceView(view, rerender = true) {
    workspaceView = view;
    ['explorer', 'report', 'run', 'gallery', 'tables', 'logs'].forEach(v => {
        document.getElementById(`tab-${v}`)?.classList.toggle('active', v === view);
    });
    if (rerender) renderCurrentWorkspaceView();
}

function renderCurrentWorkspaceView() {
    if (workspaceView === 'run') {
        renderWorkspaceRun();
        return;
    }
    if (activeFilePath) {
        const f = (window.__workspaceFiles || collectSessionArtifacts()).find(x => x.path === activeFilePath);
        if (f && ['report', 'tables', 'gallery', 'explorer'].includes(workspaceView)) {
            renderFilePreview(f);
            return;
        }
    }
    if (workspaceView === 'gallery') renderWorkspaceGallery();
    else if (workspaceView === 'tables') renderWorkspaceTables();
    else if (workspaceView === 'logs') renderWorkspaceLogs();
    else if (workspaceView === 'report') renderLatestReport();
    else renderWorkspaceEmpty();
}

async function renderWorkspaceRun(fetchServer = true) {
    const content = document.getElementById('workspace-content');
    const run = currentRunId ? getRun(currentRunId) : (getActiveSession().runs || [])[0];
    if (!run) {
        content.innerHTML = `<div class="h-full flex items-center justify-center text-gray-600 text-[13px]">No run selected.</div>`;
        return;
    }

    let serverRun = null;
    if (fetchServer) {
        try {
            const res = await fetch(`${API_BASE}/api/runs/${encodeURIComponent(run.id)}`);
            if (res.ok) {
                serverRun = await res.json();
                syncRunFromServer(serverRun);
            }
        } catch {}
    }

    const merged = getRun(run.id) || run;
    const manifest = serverRun?.manifest || merged.manifest || {};
    const preflight = serverRun?.preflight || merged.preflight || {};
    const logs = serverRun?.logs || merged.logs || [];
    const artifacts = serverRun?.artifacts || merged.artifacts || [];
    const errorClassification = serverRun?.error_classification || merged.errorClassification;

    const stepsHtml = (manifest.plan?.steps || merged.steps || []).map((s, i) => {
        const status = normalizeStepStatus(s.status || merged.steps?.[i]?.status || 'pending');
        return `
        <div class="rounded-lg border border-white/10 bg-white/[0.025] px-3 py-2">
            <div class="flex items-center justify-between gap-3">
                <div class="text-[12px] text-gray-200">${i + 1}. ${escapeHtml(s.title || s.label || s.name || s.id || 'Step')}</div>
                <span class="text-[10px] mono ${status === 'done' ? 'text-emerald-300' : status === 'failed' ? 'text-red-300' : status === 'running' ? 'text-amber-300' : 'text-gray-500'}">${escapeHtml(status)}</span>
            </div>
            ${s.description ? `<div class="text-[11px] text-gray-500 mt-1">${escapeHtml(s.description)}</div>` : ''}
            ${s.skill ? `<div class="mono text-[10px] text-indigo-300 mt-1">${escapeHtml(s.skill)} ${escapeHtml(s.args || '')}</div>` : ''}
        </div>`;
    }).join('');

    content.innerHTML = `
        <div class="h-full overflow-auto p-6">
            <div class="max-w-5xl space-y-4">
                <div class="rounded-xl border border-white/10 bg-[#0A0A0A] p-4">
                    <div class="flex items-center justify-between gap-3">
                        <div>
                            <div class="mono text-[11px] text-indigo-300">${escapeHtml(merged.id)}</div>
                            <div class="text-sm text-gray-200 mt-1">${escapeHtml(merged.query || manifest.query || '')}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] ${merged.status === 'success' ? 'text-emerald-300' : merged.status === 'failed' ? 'text-red-300' : merged.status === 'running' ? 'text-amber-300' : 'text-gray-400'}">${escapeHtml(merged.status)}</div>
                            <div class="mono text-[10px] text-gray-600 mt-1">${escapeHtml(merged.outputDir || manifest.output_dir || '')}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-4 text-[11px]">
                        <div class="rounded-lg bg-white/[0.025] border border-white/10 p-3">
                            <div class="text-gray-500">Manifest</div>
                            <button onclick="openFileByPath('${escapeAttr(merged.manifestPath || manifest.manifest_path || '')}')" class="mono text-gray-300 mt-1 break-all text-left hover:text-indigo-300">${escapeHtml(merged.manifestPath || manifest.manifest_path || '')}</button>
                        </div>
                        <div class="rounded-lg bg-white/[0.025] border border-white/10 p-3">
                            <div class="text-gray-500">Events</div>
                            <button onclick="openFileByPath('${escapeAttr(merged.eventsPath || manifest.events_path || '')}')" class="mono text-gray-300 mt-1 break-all text-left hover:text-indigo-300">${escapeHtml(merged.eventsPath || manifest.events_path || '')}</button>
                        </div>
                    </div>
                </div>

                <div class="rounded-xl border border-white/10 bg-[#0A0A0A] p-4">
                    <div class="text-sm text-gray-200 mb-3">Plan / Steps</div>
                    <div class="space-y-2">${stepsHtml || '<div class="text-[12px] text-gray-600">No steps.</div>'}</div>
                </div>

                <div class="rounded-xl border border-white/10 bg-[#0A0A0A] p-4">
                    <div class="text-sm text-gray-200 mb-3">Preflight</div>
                    <pre class="mono text-[11px] text-gray-300 whitespace-pre-wrap">${escapeHtml(JSON.stringify(preflight, null, 2))}</pre>
                </div>

                ${errorClassification ? `
                <div class="rounded-xl border border-red-500/20 bg-red-500/5 p-4">
                    <div class="text-sm text-red-200 mb-3">Error Classification</div>
                    <pre class="mono text-[11px] text-red-100/80 whitespace-pre-wrap">${escapeHtml(JSON.stringify(errorClassification, null, 2))}</pre>
                </div>` : ''}

                <div class="rounded-xl border border-white/10 bg-[#0A0A0A] p-4">
                    <div class="flex items-center justify-between mb-3">
                        <div class="text-sm text-gray-200">Artifacts</div>
                        <button onclick="setWorkspaceView('explorer')" class="text-[11px] text-gray-500 hover:text-indigo-300">Open Explorer</button>
                    </div>
                    <div class="space-y-1 max-h-56 overflow-auto">
                        ${artifacts.length ? artifacts.map(a => `
                            <button onclick="openFileByPath('${escapeAttr(a.path || '')}')" class="w-full text-left rounded-md hover:bg-white/5 px-2 py-1">
                                <span class="text-[11px] text-gray-300">${escapeHtml(a.name || a.path || '')}</span>
                                <span class="text-[10px] text-gray-600 ml-2">${escapeHtml(a.type || '')}</span>
                            </button>`).join('') : '<div class="text-[12px] text-gray-600">No artifacts registered yet.</div>'}
                    </div>
                </div>

                <div class="rounded-xl border border-white/10 bg-[#0A0A0A] p-4">
                    <div class="text-sm text-gray-200 mb-3">Recent Logs</div>
                    <div class="space-y-1 max-h-72 overflow-auto">${logs.length ? logs.map(log => `
                        <div class="mono text-[11px] leading-5">
                            <span class="${log.status === 'success' ? 'text-emerald-400' : log.status === 'error' ? 'text-red-400' : 'text-amber-400'}">${log.status === 'success' ? '✔' : log.status === 'error' ? '✖' : '➜'}</span>
                            <span class="text-gray-300 ml-1">${escapeHtml(log.step || '')}</span>
                            ${log.message ? `<div class="text-gray-600 pl-5 break-all">${escapeHtml(log.message)}</div>` : ''}
                        </div>`).join('') : '<div class="text-[12px] text-gray-600">No logs.</div>'}</div>
                </div>
            </div>
        </div>`;
}

async function refreshWorkspace() {
    const status = document.getElementById('workspace-status');
    if (status) status.innerText = 'loading...';
    window.__workspaceFiles = await fetchWorkspaceTree();
    renderFileTree();
    renderCurrentWorkspaceView();
    if (status) status.innerText = `${window.__workspaceFiles.length} files`;
}

async function fetchWorkspaceTree() {
    const runId = currentRunId || '';
    const root = document.getElementById('workspace-root')?.value || 'all';
    const urls = [
        `${API_BASE}/api/workspace/tree?session_id=${encodeURIComponent(activeSessionId)}&run_id=${encodeURIComponent(runId)}&root=${encodeURIComponent(root)}&username=${encodeURIComponent(getRuntimeUsername())}`,
        `${API_BASE}/api/artifacts?session_id=${encodeURIComponent(activeSessionId)}&run_id=${encodeURIComponent(runId)}&root=${encodeURIComponent(root)}`
    ];
    for (const url of urls) {
        try {
            const res = await fetch(url);
            if (!res.ok) continue;
            const data = await res.json();
            const files = Array.isArray(data) ? data : (data.files || data.artifacts || []);
            if (files.length) {
                return files.map(f => ({
                    path: f.path || f.url || f.name,
                    url: f.url || pathToUrl(f.path || f.name),
                    name: f.name || String(f.path || '').split('/').pop(),
                    type: f.type || getFileType(f.path || f.url || f.name),
                    runId: f.run_id || f.runId || null
                })).filter(f => !shouldIgnore(f.path));
            }
        } catch {}
    }
    return collectSessionArtifacts();
}

async function uploadFiles(kind, fileList) {
    const files = Array.from(fileList || []);
    if (!files.length) return;

    const form = new FormData();
    files.forEach(f => form.append('files', f));
    form.append('username', getRuntimeUsername());
    form.append('auth_token', getRuntimeAuthToken());

    const endpoint = kind === 'skill' ? '/api/upload/skill' : '/api/upload/data';
    const status = document.getElementById('workspace-status');
    if (status) status.innerText = `uploading ${files.length} file(s)...`;

    try {
        const res = await fetch(`${API_BASE}${endpoint}`, { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'upload failed');

        const saved = [...(data.saved || []), ...(data.extracted || [])];
        if (kind === 'skill') {
            const val = await fetch(`${API_BASE}/api/skills/validate`).then(r => r.json()).catch(() => null);
            if (status) status.innerText = `uploaded ${saved.length}; validated ${val?.skills?.length || 0} skill item(s)`;
        } else {
            if (status) status.innerText = `uploaded ${saved.length} file(s)`;
        }
        await refreshWorkspace();
    } catch (err) {
        if (status) status.innerText = `upload failed`;
        alert(`上传失败：${err.message}`);
    } finally {
        const input = kind === 'skill' ? document.getElementById('skill-upload-input') : document.getElementById('data-upload-input');
        if (input) input.value = '';
    }
}
</script>
